<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tải cấu hình iPhone</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background: #0a192f; font-family: -apple-system, sans-serif; color: white;
        }
        /* Khung giao diện chính */
        .container {
            width: 90%; max-width: 360px; padding: 40px 25px; text-align: center;
            background: rgba(255, 255, 255, 0.08); border-radius: 30px;
            backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .apple-logo { width: 55px; margin-bottom: 20px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.3)); }
        
        h1 { font-size: 24px; margin: 0 0 10px; font-weight: 600; }
        .sub-text { font-size: 14px; color: #a0aec0; line-height: 1.5; margin-bottom: 25px; }

        /* Phần nhập mật khẩu */
        .pw-box { margin-bottom: 20px; }
        input {
            width: 100%; padding: 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.3); color: #fff; font-size: 16px; text-align: center; outline: none;
        }
        input:focus { border-color: #007aff; }

        /* Nút tải theo style trong ảnh */
        .btn {
            display: block; width: 100%; padding: 16px; background: #007aff; 
            color: white; text-decoration: none; border-radius: 14px;
            font-weight: 600; font-size: 16px; border: none; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 122, 255, 0.3);
        }
        .btn:active { transform: scale(0.98); opacity: 0.9; }

        .footer-info { margin-top: 25px; font-size: 13px; color: #718096; line-height: 1.8; }
        .footer-info b { color: #edf2f7; }
        #error { color: #ff4d4d; font-size: 12px; margin-top: 8px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <svg class="apple-logo" viewBox="0 0 384 512" fill="white"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
    
    <h1>Tải cấu hình iPhone</h1>
    <div class="sub-text">Mở bằng Safari để cài đặt</div>

    <div class="pw-box">
        <input type="password" id="pass" placeholder="Nhập mã xác nhận">
        <div id="error">Mã xác nhận không đúng!</div>
    </div>

    <button onclick="handleDownload()" class="btn">TẢI CẤU HÌNH</button>

    <div class="footer-info">
        Chặn khóa iPhone hỗ trợ mọi dòng iOS.<br>
        Liên hệ hỗ trợ cài:<br>
        <b>Hotline / Zalo 0777.3422.36</b><br>
        Minh Hao Mobile
    </div>
</div>

<script>
    function handleDownload() {
        const password = document.getElementById('pass').value;
        const error = document.getElementById('error');
        
        // Cấu hình tại đây:
        const PASS_CHUAN = "190909"; 
        const LINK_FILE = "https://www.mediafire.com/file/fbrdi2wrmsk5jcw/block_fmi_minhhaov3_.mobileconfig/file";

        if (password === PASS_CHUAN) {
            window.location.href = LINK_FILE;
        } else {
            error.style.display = "block";
            document.getElementById('pass').value = "";
        }
    }
</script>

</body>
</html>
